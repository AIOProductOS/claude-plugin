name: validate
on:
  push:
    branches: [main]
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin manifest and MCP config
        run: |
          node -e "
            const fs = require('fs');
            const plugin = JSON.parse(fs.readFileSync('.claude-plugin/plugin.json', 'utf8'));
            const mcp = JSON.parse(fs.readFileSync('.mcp.json', 'utf8'));
            if (!plugin.name || !plugin.version) throw new Error('plugin.json missing name/version');
            if (!Object.keys(mcp.mcpServers ?? {}).length) throw new Error('.mcp.json has no servers');
            console.log('plugin ' + plugin.name + '@' + plugin.version + ' OK; servers: ' + Object.keys(mcp.mcpServers).join(', '));
          "
